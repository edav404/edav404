<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E5F3FF" />
      <stop offset="100%" stop-color="#CDE0F5" />
    </linearGradient>
    <filter id="glassBlur">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .font-xp { font-family: 'Trebuchet MS', 'Segoe UI', Tahoma, sans-serif; }
    .bg { fill: url(#bgGrad); }
    .glass-panel { fill: rgba(255,255,255,0.6); stroke: rgba(255,255,255,1); stroke-width: 2; }
    .title-text { font-size: 20px; fill: #0A246A; font-weight: bold; }
    .tag-box { fill: #3A6EA5; rx: 4; ry: 4; }
    .tag-text { font-size: 14px; fill: white; font-weight: bold; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0f0c29; }
      .glass-panel { fill: rgba(255,255,255,0.1); stroke: rgba(255,255,255,0.2); }
      .title-text { fill: #E5F3FF; }
      .tag-box { fill: #4CAF50; }
    }
  </style>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="450" class="bg"/>

  <!-- Section Title -->
  <rect x="40" y="20" width="720" height="40" rx="4" ry="4" fill="#0A246A"/>
  <text x="60" y="47" class="font-xp title-text" fill="white">TECH_STACK.DLL</text>

  <!-- Bento Grid Cards -->
  
  <!-- Frontend -->
  <rect x="40" y="80" width="340" height="180" rx="8" ry="8" class="glass-panel" filter="url(#glassBlur)"/>
  <text x="60" y="110" class="font-xp title-text">Frontend</text>
  <rect x="60" y="130" width="100" height="30" class="tag-box"/><text x="110" y="150" class="font-xp tag-text" text-anchor="middle">React</text>
  <rect x="170" y="130" width="100" height="30" class="tag-box"/><text x="220" y="150" class="font-xp tag-text" text-anchor="middle">TypeScript</text>
  <rect x="60" y="170" width="100" height="30" class="tag-box"/><text x="110" y="190" class="font-xp tag-text" text-anchor="middle">JavaScript</text>
  <rect x="170" y="170" width="100" height="30" class="tag-box"/><text x="220" y="190" class="font-xp tag-text" text-anchor="middle">Vite</text>
  <rect x="60" y="210" width="100" height="30" class="tag-box"/><text x="110" y="230" class="font-xp tag-text" text-anchor="middle">HTML5</text>
  <rect x="170" y="210" width="100" height="30" class="tag-box"/><text x="220" y="230" class="font-xp tag-text" text-anchor="middle">CSS3</text>

  <!-- Backend & DB -->
  <rect x="400" y="80" width="360" height="180" rx="8" ry="8" class="glass-panel" filter="url(#glassBlur)"/>
  <text x="420" y="110" class="font-xp title-text">Backend &amp; DB</text>
  <rect x="420" y="130" width="100" height="30" class="tag-box"/><text x="470" y="150" class="font-xp tag-text" text-anchor="middle">Python</text>
  <rect x="530" y="130" width="100" height="30" class="tag-box"/><text x="580" y="150" class="font-xp tag-text" text-anchor="middle">Node.js</text>
  <rect x="420" y="170" width="100" height="30" class="tag-box"/><text x="470" y="190" class="font-xp tag-text" text-anchor="middle">Supabase</text>
  <rect x="530" y="170" width="100" height="30" class="tag-box"/><text x="580" y="190" class="font-xp tag-text" text-anchor="middle">SQL</text>

  <!-- DevOps & Tools -->
  <rect x="40" y="280" width="720" height="140" rx="8" ry="8" class="glass-panel" filter="url(#glassBlur)"/>
  <text x="60" y="310" class="font-xp title-text">DevOps, Tools &amp; CMS</text>
  <rect x="60" y="330" width="80" height="30" class="tag-box"/><text x="100" y="350" class="font-xp tag-text" text-anchor="middle">Git</text>
  <rect x="150" y="330" width="80" height="30" class="tag-box"/><text x="190" y="350" class="font-xp tag-text" text-anchor="middle">GitHub</text>
  <rect x="240" y="330" width="90" height="30" class="tag-box"/><text x="285" y="350" class="font-xp tag-text" text-anchor="middle">VS Code</text>
  <rect x="340" y="330" width="80" height="30" class="tag-box"/><text x="380" y="350" class="font-xp tag-text" text-anchor="middle">Ubuntu</text>
  <rect x="430" y="330" width="80" height="30" class="tag-box"/><text x="470" y="350" class="font-xp tag-text" text-anchor="middle">Netlify</text>
  
  <rect x="60" y="370" width="100" height="30" class="tag-box"/><text x="110" y="390" class="font-xp tag-text" text-anchor="middle">WordPress</text>
  <rect x="170" y="370" width="100" height="30" class="tag-box"/><text x="220" y="390" class="font-xp tag-text" text-anchor="middle">Shopify</text>
  
</svg>
